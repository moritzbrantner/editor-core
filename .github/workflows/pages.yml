name: Deploy React example

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy:
    uses: moritzbrantner/reusable-workflows/.github/workflows/deploy-pages.yml@workflow-standard-v1.2
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pages: write
    secrets: inherit
    with:
      bun_version: "1.3.14"
      install_command: "bun install --frozen-lockfile"
      pre_command: "bun run example:check-types"
      build_command: "GITHUB_PAGES=true bun run example:build"
      artifact_path: "examples/react/dist"
