name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read
  id-token: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release
        run: bun run verify:release

  validate-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Validate workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in {1..60}; do
            line="$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow "Validate" \
              --commit "${GITHUB_SHA}" \
              --event push \
              --limit 1 \
              --json databaseId,status,conclusion \
              --jq '.[] | [.databaseId, .status, (.conclusion // "")] | @tsv' || true)"

            if [ -z "${line}" ]; then
              echo "Waiting for Validate workflow to start for ${GITHUB_SHA}..."
              sleep 30
              continue
            fi

            run_id="$(printf '%s\n' "${line}" | cut -f1)"
            status="$(printf '%s\n' "${line}" | cut -f2)"
            conclusion="$(printf '%s\n' "${line}" | cut -f3)"
            echo "Validate workflow run ${run_id}: ${status} ${conclusion}"

            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                exit 0
              fi
              echo "Validate workflow did not pass."
              exit 1
            fi

            sleep 30
          done

          echo "Timed out waiting for Validate workflow."
          exit 1

  publish:
    runs-on: ubuntu-latest
    needs:
      - release-validation
      - validate-workflow
    environment: npm
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_name="${GITHUB_REF_NAME}"
          if [ "${tag_name}" != "v${package_version}" ]; then
            echo "Tag ${tag_name} does not match package version ${package_version}."
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --access public --provenance
