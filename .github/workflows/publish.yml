name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium

      - name: Verify release
        run: bun run verify:release

  validate-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Validate workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in {1..60}; do
            line="$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow "Validate" \
              --commit "${GITHUB_SHA}" \
              --event push \
              --limit 1 \
              --json databaseId,status,conclusion \
              --jq '.[] | [.databaseId, .status, (.conclusion // "")] | @tsv' || true)"

            if [ -z "${line}" ]; then
              echo "Waiting for Validate workflow to start for ${GITHUB_SHA}... (${attempt}/60)"
              sleep 30
              continue
            fi

            run_id="$(printf '%s\n' "${line}" | cut -f1)"
            status="$(printf '%s\n' "${line}" | cut -f2)"
            conclusion="$(printf '%s\n' "${line}" | cut -f3)"
            echo "Validate workflow run ${run_id}: ${status} ${conclusion}"

            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                exit 0
              fi
              echo "Validate workflow did not pass."
              exit 1
            fi

            sleep 30
          done

          echo "Timed out waiting for Validate workflow."
          exit 1

  publish:
    # v0.4.0 is the one-time manual bootstrap publish for the @moenarch npm scope.
    if: github.ref_name != 'v0.4.0'
    runs-on: ubuntu-latest
    needs:
      - release-validation
      - validate-workflow
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify npm trusted publishing support
        run: |
          npm_version="$(npm --version)"
          node - "${npm_version}" <<'NODE'
          const [major, minor, patch] = process.argv[2].split(".").map(Number);
          const actual = [major, minor, patch];
          const required = [11, 5, 1];
          const isSupported = actual.reduce((result, part, index) => {
            if (result !== 0) {
              return result;
            }
            return Math.sign(part - required[index]);
          }, 0) >= 0;

          if (!isSupported) {
            console.error(
              `npm ${process.argv[2]} does not support trusted publishing. ` +
                "Use npm >= 11.5.1.",
            );
            process.exit(1);
          }
          NODE

      - name: Verify release metadata
        run: |
          package_version="$(node -p "require('./package.json').version")"
          package_name="$(node -p "require('./package.json').name")"
          tag_name="${GITHUB_REF_NAME}"

          if [ "${tag_name}" != "v${package_version}" ]; then
            echo "Tag ${tag_name} does not match package version ${package_version}."
            exit 1
          fi

          node - "${package_version}" <<'NODE'
          const { readFileSync } = require("node:fs");
          const version = process.argv[2];
          const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const changelog = readFileSync("CHANGELOG.md", "utf8");
          const heading = new RegExp(
            `^##\\s+(?:${escapedVersion}|\\[${escapedVersion}\\])(?:\\s|$)`,
            "m",
          );

          if (!heading.test(changelog)) {
            console.error(`CHANGELOG.md does not contain an entry for ${version}.`);
            process.exit(1);
          }
          NODE

          if npm view "${package_name}@${package_version}" version --json >/tmp/published-version.json 2>/tmp/npm-view-error.log; then
            echo "${package_name}@${package_version} is already published:"
            cat /tmp/published-version.json
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
